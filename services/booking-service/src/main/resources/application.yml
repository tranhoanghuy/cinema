spring:
  application:
    name: booking-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:booking_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 3000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.batch_size: 50
        order_inserts: true
        order_updates: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:cinetix}
    password: ${RABBITMQ_PASS:cinetix_secret}
    virtual-host: ${RABBITMQ_VHOST:/cinetix}
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 10

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis_secret}
      timeout: 2s

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:http://localhost:8180}/realms/cinetix

server:
  port: 8082
  shutdown: graceful

grpc:
  server:
    port: 9082
  client:
    showtime-service:
      address: ${SHOWTIME_GRPC_ADDRESS:static://localhost:9083}
      negotiation-type: plaintext
    payment-service:
      address: ${PAYMENT_GRPC_ADDRESS:static://localhost:9086}
      negotiation-type: plaintext
    promotion-service:
      address: ${PROMOTION_GRPC_ADDRESS:static://localhost:9088}
      negotiation-type: plaintext

resilience4j:
  circuitbreaker:
    instances:
      showtime-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
      payment-service:
        sliding-window-size: 5
        failure-rate-threshold: 40
        wait-duration-in-open-state: 60s
  retry:
    instances:
      showtime-hold:
        max-attempts: 3
        wait-duration: 100ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2.0

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    sampling:
      probability: 1.0
  metrics:
    export:
      prometheus:
        enabled: true

cinetix:
  outbox:
    relay-interval-ms: 500
    batch-size: 100
    max-retries: 5

spring.lifecycle:
  timeout-per-shutdown-phase: 30s

logging:
  pattern:
    console: "%d{ISO8601} [%thread] %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
  level:
    com.cinetix: DEBUG
    org.hibernate.SQL: DEBUG
