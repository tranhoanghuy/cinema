image:
  repository: cinetix/cinetix-platform/promotion-service
  tag: "latest"

service:
  port: 8088

grpc:
  enabled: true
  port: 9088

extraEnv:
  - name: SPRING_PROFILES_ACTIVE
    value: k8s
  - name: DB_HOST
    value: postgres
  - name: DB_PORT
    value: "5432"
  - name: DB_NAME
    value: promotion_db
  - name: REDIS_HOST
    value: redis
  - name: KEYCLOAK_URL
    value: http://keycloak:8080

extraEnvFrom:
  - secretRef:
      name: promotion-service-secrets
