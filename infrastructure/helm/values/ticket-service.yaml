image:
  repository: cinetix/cinetix-platform/ticket-service
  tag: "latest"

service:
  port: 8087

extraEnv:
  - name: SPRING_PROFILES_ACTIVE
    value: k8s
  - name: DB_HOST
    value: postgres
  - name: DB_PORT
    value: "5432"
  - name: DB_NAME
    value: ticket_db
  - name: RABBITMQ_HOST
    value: rabbitmq
  - name: KEYCLOAK_URL
    value: http://keycloak:8080

extraEnvFrom:
  - secretRef:
      name: ticket-service-secrets
